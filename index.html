<!DOCTYPE html>
<html>
<head>
<title>For You ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#ffe6f0,#fff6d6);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
padding:20px;
}
.card{
background:white;
padding:28px;
border-radius:24px;
text-align:center;
max-width:420px;
box-shadow:0 15px 40px rgba(0,0,0,0.15);
}
.photo{
width:100%;
max-width:330px;
border-radius:20px;
margin:15px 0;
box-shadow:0 8px 25px rgba(0,0,0,0.18);
}
h1{color:#ff4d88;}
button,a{
display:inline-block;
padding:13px 20px;
border:none;
border-radius:999px;
font-size:16px;
margin:8px;
text-decoration:none;
}
.yes{
background:#ff4d88;
color:white;
cursor:pointer;
}
.map{
background:#f1f3f5;
color:#333;
}
#result{
font-weight:bold;
color:#ff4d88;
font-size:18px;
}
</style>
</head>
<body>

<div class="card">
<h1>Hii cutiee ❤️</h1>

<img src="us.jpg" class="photo">

<p>I’d love to spend tomorrow evening with you.</p>

<p><strong>Date:</strong> 8 June 2026</p>
<p><strong>Time:</strong> 7:00 PM</p>
<p><strong>Location:</strong> Chimichanga, Holland Village</p>

<p id="countdown"></p>

<h2>Will you go out with me?</h2>

<button class="yes" onclick="answer()">Yes!</button>

<a class="map" href="https://www.google.com/maps/search/?api=1&query=Chimichanga+Holland+Village" target="_blank">
Open location
</a>

<p id="result"></p>
</div>

<script>
function answer(){
document.getElementById("result").innerHTML =
"Yay! See you :DDD ❤️";
confetti();
}

function confetti(){
for(let i=0;i<25;i++){
let heart=document.createElement("div");
heart.innerHTML="❤️";
heart.style.position="fixed";
heart.style.left=Math.random()*100+"vw";
heart.style.top="-20px";
heart.style.fontSize="22px";
heart.style.animation="fall 3s linear forwards";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),3000);
}
}

let style=document.createElement("style");
style.innerHTML="@keyframes fall{to{transform:translateY(110vh);opacity:0;}}";
document.head.appendChild(style);

let date=new Date("June 8, 2026 19:00:00").getTime();
setInterval(function(){
let now=new Date().getTime();
let distance=date-now;
let hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
let minutes=Math.floor((distance%(1000*60*60))/(1000*60));
if(distance>0){
document.getElementById("countdown").innerHTML =
"Countdown: "+hours+"h "+minutes+"m to go";
}
},1000);
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>A Question For You ❤️</title>
<style>
body{
font-family:Arial,sans-serif;
background:#ffe6f0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}
.card{
background:white;
padding:30px;
border-radius:20px;
text-align:center;
max-width:400px;
box-shadow:0 0 20px rgba(0,0,0,0.1);
}
button{
padding:12px 20px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
margin:10px;
}
.yes{
background:#ff4d88;
color:white;
}
</style>
</head>
<body>

<div class="card">
<h1>Hey Love ❤️</h1>

<p>I'd love to spend tomorrow evening with you.</p>

<p><strong>Date:</strong> 8 June 2026</p>
<p><strong>Time:</strong> 7:00 PM</p>
<p><strong>Location:</strong> Chimichanga, Holland Village</p>

<h2>Will you go out with me?</h2>

<button class="yes" onclick="answer()">Yes!</button>

<p id="result"></p>
</div>

<script>
function answer(){
document.getElementById("result").innerHTML =
"Yay! I can't wait to see you tomorrow ❤️";
}
</script>

</body>
</html>
